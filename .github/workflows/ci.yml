name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Download dependencies
        run: go mod download && go mod tidy

      - name: Build
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo dev)
          COMMIT=$(git rev-parse --short HEAD 2>/dev/null || echo unknown)
          go build -ldflags "-X github.com/ElioNeto/agnostikos/cmd/agnostic.Version=$VERSION -X github.com/ElioNeto/agnostikos/cmd/agnostic.Commit=$COMMIT" -o build/agnostic .

      - name: Test
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Verify integration tests compile (but don't run)
        run: go test -tags=integration -run=^$ -count=0 ./internal/manager/

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          args: --timeout=5m ./...

  # build-and-test-arm64: valida compilação e testes para ARM64 via emulação QEMU.
  build-and-test-arm64:
    name: Build & Test (linux/arm64)
    needs: [build-and-test, lint]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      - name: Download dependencies
        run: go mod download && go mod tidy
      - name: Build (arm64 cross-compile)
        run: GOARCH=arm64 GOARM=7 go build -o build/agnostic-arm64 .
      - name: Test (arm64 emulation)
        run: GOARCH=arm64 go test -v -count=1 -timeout 10m ./...
      - name: Vet (arm64)
        run: GOARCH=arm64 go vet ./...

  integration-e2e:
    needs: [build-and-test, lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - run: go test ./tests/integration/... -v -count=1

  # test-iso-headless: teste rápido de boot ISO com rootfs mínimo (kernel do host + initramfs
  # de teste sem busybox). Roda em push/PR para validar que a ISO ainda boota.
  # Usa TCG (sem KVM) — lento mas funcional. Timeout 300s para emulação TCG.
  test-iso-headless:
    if: github.event_name != 'workflow_dispatch'
    needs: [build-and-test, lint]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Install dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq qemu-system-x86 xorriso grub-pc-bin grub-efi-amd64-bin mtools ovmf
      - name: Prepare minimal rootfs
        run: bash scripts/prepare-minimal-rootfs.sh
      - name: Build minimal ISO
        run: make minimal-iso
      - name: Test ISO (headless, TCG)
        run: HEADLESS=1 BOOT_TIMEOUT=300 make test-minimal-iso-headless

  # test-iso: compila kernel 6.6 + busybox + initramfs + ISO, depois roda QEMU.
  # Usa TCG (sem KVM) em GitHub Actions — mais lento porém funcional.
  # Kernel + busybox compilados do fonte (~25 min total em ubuntu-latest).
  # Executa apenas manualmente (workflow_dispatch) devido ao tempo de build.
  test-iso:
    if: github.event_name == 'workflow_dispatch'
    needs: [build-and-test, lint]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Install dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq qemu-system-x86 xorriso grub-pc-bin grub-efi-amd64-bin mtools ovmf wget libelf-dev libssl-dev bc flex bison dwarves python3
      - name: Build Go binary
        run: make build
      - name: Bootstrap (full, with GRUB)
        run: sudo make bootstrap ARGS="--force --skip-toolchain"
      - name: Build ISO
        run: make iso
      - name: Test ISO (headless, TCG)
        run: HEADLESS=1 BOOT_TIMEOUT=300 make test-iso-headless

  # test-iso-headless-arm64: teste de boot ISO ARM64 com QEMU + UEFI (AAVMF).
  # Usa kernel ARM64 pré-compilado e busybox estático ARM64 baixados via script.
  # Executa apenas manualmente (workflow_dispatch) — análogo ao test-iso.
  test-iso-headless-arm64:
    if: github.event_name == 'workflow_dispatch'
    needs: [build-and-test, lint]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      - name: Install dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq qemu-system-aarch64 xorriso mtools ovmf grub-efi-arm64-bin
      - name: Build Go binary
        run: make build
      - name: Prepare minimal ARM64 rootfs
        run: bash scripts/prepare-minimal-rootfs-arm64.sh
      - name: Build ARM64 ISO
        run: |
          ./build/agnostic iso \
            --rootfs /mnt/data/agnostikOS/minimal-rootfs-arm64 \
            --output /mnt/data/agnostikOS/build/agnostikos-arm64.iso \
            --uefi
      - name: Test ARM64 ISO (headless, UEFI)
        run: |
          # Use AAVMF (ARM64 OVMF) for UEFI boot
          if [ -f /usr/share/AAVMF/AAVMF_CODE.fd ]; then
            CODE_FD=/usr/share/AAVMF/AAVMF_CODE.fd
            VARS_FD=/usr/share/AAVMF/AAVMF_VARS.fd
          elif [ -f /usr/share/edk2/aarch64/OVMF_CODE.fd ]; then
            CODE_FD=/usr/share/edk2/aarch64/OVMF_CODE.fd
            VARS_FD=/usr/share/edk2/aarch64/OVMF_VARS.fd
          else
            echo "AAVMF not found"
            exit 1
          fi
          VARS_TMP=$(mktemp /tmp/arm64-vars-XXXXXX.fd)
          cp "${VARS_FD}" "${VARS_TMP}"
          SERIAL_LOG=/tmp/qemu-arm64.log
          timeout 300 qemu-system-aarch64 \
            -machine virt \
            -cpu cortex-a57 \
            -m 2G \
            -smp 2 \
            -drive if=pflash,format=raw,readonly=on,file=${CODE_FD} \
            -drive if=pflash,format=raw,file=${VARS_TMP} \
            -cdrom /mnt/data/agnostikOS/build/agnostikos-arm64.iso \
            -display none \
            -serial file:${SERIAL_LOG} \
            -device virtio-net-pci,netdev=net0 \
            -netdev user,id=net0 \
            -no-reboot || true
          # Check serial log for boot indicators
          if grep -qi "Welcome to Agnostikos" "${SERIAL_LOG}"; then
            echo "✅ ARM64 boot test PASSED"
          elif grep -qi "Linux version" "${SERIAL_LOG}"; then
            echo "✅ ARM64 boot test PASSED (kernel boot detected)"
          elif grep -qi "Kernel panic" "${SERIAL_LOG}"; then
            echo "❌ ARM64 boot test FAILED (kernel panic)"
            cat "${SERIAL_LOG}"
            exit 1
          else
            echo "❌ ARM64 boot test FAILED - no boot indicators found"
            cat "${SERIAL_LOG}"
            exit 1
          fi
          rm -f "${VARS_TMP}" "${SERIAL_LOG}"
