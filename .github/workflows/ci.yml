name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Download dependencies
        run: go mod download && go mod tidy

      - name: Build
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo dev)
          COMMIT=$(git rev-parse --short HEAD 2>/dev/null || echo unknown)
          go build -ldflags "-X github.com/ElioNeto/agnostikos/cmd/agnostic.Version=$VERSION -X github.com/ElioNeto/agnostikos/cmd/agnostic.Commit=$COMMIT" -o build/agnostic .

      - name: Test
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Verify integration tests compile (but don't run)
        run: go test -tags=integration -run=^$ -count=0 ./internal/manager/

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m ./...

  # test-iso: requires KVM + root + 20min kernel compilation.
  # Locally: HEADLESS=1 BOOT_TIMEOUT=300 make test-iso-headless
  #
  # This job runs only on self-hosted runners with KVM access.
  # GitHub-hosted runners do not support KVM or long-running builds.
  test-iso:
    if: github.event_name == 'workflow_dispatch'
    needs: [build-and-test, lint]
    runs-on: [self-hosted, linux, x64, kvm]
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Install dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq qemu-system-x86 xorriso grub-pc-bin grub-efi-amd64-bin mtools ovmf
      - name: Build
        run: make build
      - name: Bootstrap (skip GRUB for ISO-only build)
        run: sudo make bootstrap ARGS="--skip-grub"
      - name: Build ISO
        run: make iso
      - name: Test ISO (headless, TCG)
        run: HEADLESS=1 BOOT_TIMEOUT=300 make test-iso-headless
