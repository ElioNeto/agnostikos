name: BUILD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Download dependencies
        run: go mod download && go mod tidy

      - name: Build
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo dev)
          COMMIT=$(git rev-parse --short HEAD 2>/dev/null || echo unknown)
          go build -ldflags "-X github.com/ElioNeto/agnostikos/cmd/agnostic.Version=$VERSION -X github.com/ElioNeto/agnostikos/cmd/agnostic.Commit=$COMMIT" -o build/agnostic .

      - name: Test
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          args: --timeout=5m ./...

  test-iso:
    needs: [build-and-test, lint]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Install dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq qemu-system-x86 xorriso
      - name: Build
        run: make build
      - name: Bootstrap minimal RootFS
        run: make bootstrap
      - name: Build ISO
        run: make iso
      - name: Test ISO (headless, TCG)
        run: make test-iso-headless
