{{define "content"}}
<h1 style="margin-bottom:1.5rem; font-size:1.75rem; font-weight:700;">ISO Builder</h1>

<div class="card">
  <h2>Build Configuration</h2>
  <p style="color:#94a3b8; font-size:0.875rem; margin-bottom:1rem;">
    Configure the ISO build parameters before starting.
  </p>
  <form id="build-config-form">
    <div class="grid" style="grid-template-columns: 1fr 1fr;">
      <div class="form-group">
        <label for="iso-name">Name</label>
        <input type="text" id="iso-name" name="name" value="AgnostikOS" placeholder="AgnostikOS">
      </div>
      <div class="form-group">
        <label for="iso-version">Version</label>
        <input type="text" id="iso-version" name="version" value="0.1.0" placeholder="0.1.0">
      </div>
      <div class="form-group">
        <label for="iso-busybox">Busybox Version</label>
        <input type="text" id="iso-busybox" name="busybox_version" value="1.36.1" placeholder="1.36.1">
      </div>
      <div class="form-group">
        <label for="iso-kernel">Kernel Version</label>
        <input type="text" id="iso-kernel" name="kernel_version" placeholder="e.g. 6.6.0">
      </div>
      <div class="form-group">
        <label for="iso-arch">Architecture</label>
        <select id="iso-arch" name="arch">
          <option value="amd64">amd64</option>
          <option value="i386">i386</option>
          <option value="arm64">arm64</option>
        </select>
      </div>
      <div class="form-group">
        <label for="iso-target">Target Directory</label>
        <input type="text" id="iso-target" name="target_dir" placeholder="/tmp/agnostikos">
      </div>
      <div class="form-group">
        <label for="iso-output">Output ISO Path</label>
        <input type="text" id="iso-output" name="output_iso" placeholder="/tmp/agnostikos/build/agnostikos.iso">
      </div>
      <div class="form-group">
        <label for="iso-boot-label">Boot Label</label>
        <input type="text" id="iso-boot-label" name="boot_label" placeholder="AgnostikOS 0.1.0">
      </div>
    </div>
    <div class="flex flex-wrap" style="gap:1rem; margin-top:0.5rem;">
      <label class="flex" style="cursor:pointer;">
        <input type="checkbox" id="iso-uefi" name="uefi" style="width:auto;">
        <span style="margin-left:0.5rem; color:#94a3b8; font-size:0.875rem;">UEFI Support</span>
      </label>
      <label class="flex" style="cursor:pointer;">
        <input type="checkbox" id="iso-skip-toolchain" name="skip_toolchain" style="width:auto;">
        <span style="margin-left:0.5rem; color:#94a3b8; font-size:0.875rem;">Skip Toolchain</span>
      </label>
      <label class="flex" style="cursor:pointer;">
        <input type="checkbox" id="iso-skip-kernel" name="skip_kernel" style="width:auto;">
        <span style="margin-left:0.5rem; color:#94a3b8; font-size:0.875rem;">Skip Kernel</span>
      </label>
      <label class="flex" style="cursor:pointer;">
        <input type="checkbox" id="iso-skip-busybox" name="skip_busybox" style="width:auto;">
        <span style="margin-left:0.5rem; color:#94a3b8; font-size:0.875rem;">Skip Busybox</span>
      </label>
      <label class="flex" style="cursor:pointer;">
        <input type="checkbox" id="iso-skip-initramfs" name="skip_initramfs" style="width:auto;">
        <span style="margin-left:0.5rem; color:#94a3b8; font-size:0.875rem;">Skip Initramfs</span>
      </label>
      <label class="flex" style="cursor:pointer;">
        <input type="checkbox" id="iso-skip-grub" name="skip_grub" style="width:auto;">
        <span style="margin-left:0.5rem; color:#94a3b8; font-size:0.875rem;">Skip GRUB</span>
      </label>
      <label class="flex" style="cursor:pointer;">
        <input type="checkbox" id="iso-force" name="force" style="width:auto;">
        <span style="margin-left:0.5rem; color:#94a3b8; font-size:0.875rem;">Force Overwrite</span>
      </label>
    </div>
  </form>
</div>

<div class="card">
  <h2>Build ISO Image</h2>
  <p style="color:#94a3b8; font-size:0.875rem; margin-bottom:1rem;">
    Generate a bootable ISO image from the current system configuration.
  </p>

  <button id="build-btn"
          hx-post="/api/iso/build"
          hx-swap="none"
          hx-vals='js:getBuildConfigJSON();'
          hx-headers='{"Content-Type":"application/json"}'
          _="on htmx:afterRequest if response.status == 200 then
             put 'ISO build started...' into #build-status
             else put 'Failed to start build' into #build-status">
    💿 Start ISO Build
  </button>

  <p id="build-status" style="margin-top:0.75rem; font-weight:600;"></p>
</div>

<div class="card">
  <h2>Build Progress</h2>
  <div id="iso-progress-container"
       hx-ext="sse" sse-connect="/events"
       sse-swap="iso:progress,iso:done,iso:error"
       hx-swap="innerHTML">
    <div id="iso-progress">
      <p style="color:#64748b;">No active build.</p>
    </div>
  </div>
</div>

<div class="card">
  <h2>Current Status</h2>
  <div id="iso-status-display"
       hx-get="/api/iso/status"
       hx-trigger="every 5s">
    <p style="color:#64748b;">Checking status...</p>
  </div>
</div>

<script>
  // Serialize build config form as JSON object
  function getBuildConfigJSON() {
    var form = document.getElementById('build-config-form');
    var data = {};
    for (var i = 0; i < form.elements.length; i++) {
      var el = form.elements[i];
      if (!el.name) continue;
      if (el.type === 'checkbox') {
        data[el.name] = el.checked;
      } else if (el.value !== '') {
        data[el.name] = el.value;
      }
    }
    return data;
  }

  // Update progress display on SSE events
  document.body.addEventListener('sse:iso:progress', function(evt) {
    var el = document.getElementById('iso-progress');
    if (el) el.innerHTML = '<div class="progress-bar"><div class="progress-bar-fill" style="width:50%"></div></div><p style="color:#94a3b8;margin-top:0.5rem;">' + evt.detail.data + '</p>';
  });
  document.body.addEventListener('sse:iso:done', function(evt) {
    var el = document.getElementById('iso-progress');
    if (el) el.innerHTML = '<div class="progress-bar"><div class="progress-bar-fill" style="width:100%;background:#10b981;"></div></div><p style="color:#10b981;margin-top:0.5rem;">' + evt.detail.data + '</p>';
  });
  document.body.addEventListener('sse:iso:error', function(evt) {
    var el = document.getElementById('iso-progress');
    if (el) el.innerHTML = '<p style="color:#ef4444;">Error: ' + evt.detail.data + '</p>';
  });
</script>
{{end}}
