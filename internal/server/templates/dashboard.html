{{define "content"}}
<h1 style="margin-bottom:2rem; font-size:1.75rem; font-weight:700;">Dashboard</h1>

<div class="grid">
  <div class="card">
    <h2>Available Backends</h2>
    <div class="stat-value">{{len .Backends}}</div>
    <div class="stat-label">Registered package backends</div>
    <div class="flex flex-wrap mt-2">
      {{range .Backends}}
      <span class="badge badge-{{.}}" style="margin-right:0.5rem;">{{.}}</span>
      {{end}}
    </div>
  </div>

  <div class="card">
    <h2>System Status</h2>
    <div id="system-status">
      <p style="color:#94a3b8;">Server running</p>
      <p style="color:#64748b; font-size:0.875rem; margin-top:0.5rem;">
        Use the <a href="/packages" style="color:#38bdf8;">Packages</a> page to manage software.
      </p>
    </div>
  </div>

  <div class="card">
    <h2>Quick Actions</h2>
    <div class="flex" style="gap:0.75rem; flex-wrap:wrap;">
      <a href="/packages"><button>📦 Manage Packages</button></a>
      <a href="/iso"><button>💿 Build ISO</button></a>
    </div>
  </div>
</div>

<div class="card" style="margin-top:1.5rem;">
  <h2>Recent Activity</h2>
  <div hx-ext="sse" sse-connect="/events" sse-swap="message" hx-swap="beforeend">
    <p id="events" style="color:#64748b; font-size:0.875rem;">Waiting for events...</p>
  </div>
</div>
{{end}}
