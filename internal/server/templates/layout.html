<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgnostikOS Web UI</title>
  <script src="https://unpkg.com/htmx.org@2.0.4" integrity="sha384-HGfztofotfshcF7+8n44JQL2oJN4nI4LgLcX7iitHrWgK3R4N8M1V+zcFmJ7M+" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12/dist/ext/sse.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
    }
    nav {
      background: #1e293b;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 2rem;
      border-bottom: 1px solid #334155;
    }
    nav a {
      color: #94a3b8;
      text-decoration: none;
      font-weight: 500;
      padding: 0.5rem 0;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    nav a:hover, nav a.active { color: #38bdf8; border-bottom-color: #38bdf8; }
    .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .card h2 { color: #38bdf8; margin-bottom: 1rem; font-size: 1.25rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; }
    .stat-value { font-size: 2.5rem; font-weight: 700; color: #f8fafc; }
    .stat-label { font-size: 0.875rem; color: #64748b; margin-top: 0.25rem; }
    input, select, button {
      padding: 0.625rem 1rem;
      border: 1px solid #334155;
      border-radius: 8px;
      background: #0f172a;
      color: #e2e8f0;
      font-size: 0.875rem;
    }
    input:focus, select:focus { outline: none; border-color: #38bdf8; }
    button {
      background: #38bdf8;
      color: #0f172a;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: background 0.2s;
    }
    button:hover { background: #7dd3fc; }
    button.danger { background: #ef4444; }
    button.danger:hover { background: #f87171; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 0.75rem 0.5rem; border-bottom: 1px solid #334155; }
    th { color: #64748b; font-weight: 600; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
    td { font-size: 0.875rem; }
    tr:hover td { background: #1e293b; }
    .badge {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .badge-pacman { background: #3b82f6; color: #fff; }
    .badge-nix { background: #8b5cf6; color: #fff; }
    .badge-flatpak { background: #10b981; color: #fff; }
    .toast {
      position: fixed; bottom: 2rem; right: 2rem;
      background: #1e293b; border: 1px solid #334155;
      border-radius: 8px; padding: 1rem 1.5rem;
      display: none; z-index: 100;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }
    .toast.show { display: block; }
    .progress-bar {
      width: 100%; height: 8px;
      background: #334155; border-radius: 4px;
      overflow: hidden; margin-top: 1rem;
    }
    .progress-bar-fill {
      height: 100%; background: #38bdf8;
      transition: width 0.3s; width: 0%;
    }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; margin-bottom: 0.5rem; color: #94a3b8; font-size: 0.875rem; }
    .flex { display: flex; gap: 0.5rem; align-items: center; }
    .flex-wrap { flex-wrap: wrap; }
    .mt-2 { margin-top: 0.5rem; }
    .mb-2 { margin-bottom: 0.5rem; }
    /* Auth dialog overlay */
    .auth-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.7);
      display: flex; align-items: center; justify-content: center;
    }
    .auth-dialog {
      background: #1e293b; border: 1px solid #334155;
      border-radius: 12px; padding: 2rem; max-width: 420px; width: 90%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .auth-dialog h2 { color: #38bdf8; margin-bottom: 0.5rem; }
    .auth-dialog p { color: #94a3b8; font-size: 0.875rem; margin-bottom: 1.5rem; }
    .auth-dialog input { width: 100%; margin-bottom: 1rem; }
    .auth-dialog .hint {
      font-size: 0.75rem; color: #64748b; margin-top: 0.75rem;
      background: #0f172a; padding: 0.75rem; border-radius: 6px;
      word-break: break-all;
    }
    .auth-dialog .hint code { color: #f59e0b; }
  </style>
</head>
<body>
  <!-- Auth Dialog -->
  <div id="auth-overlay" class="auth-overlay" style="display:none;">
    <div class="auth-dialog">
      <h2>🔑 Authentication Required</h2>
      <p>Enter your AgnostikOS authentication token to access the Web UI.</p>
      <input type="text" id="auth-token-input" placeholder="Paste your token here" autocomplete="off">
      <button id="auth-token-btn" style="width:100%;">Save Token</button>
      <div class="hint">
        Token not set? Check the server console output for the auto-generated token,
        or set the <code>AGNOSTIKOS_TOKEN</code> environment variable.
      </div>
    </div>
  </div>

  <nav>
    <strong style="color:#38bdf8; font-size:1.1rem;">AgnostikOS</strong>
    <a href="/">Dashboard</a>
    <a href="/packages">Packages</a>
    <a href="/iso">ISO Builder</a>
  </nav>
  <div class="container">
    {{template "content" .}}
  </div>

  <script>
    (function() {
      var STORAGE_KEY = 'agnostikos_token';

      function getToken() {
        return localStorage.getItem(STORAGE_KEY) || '';
      }

      function setToken(token) {
        localStorage.setItem(STORAGE_KEY, token);
      }

      function updateSSEConnections(token) {
        var els = document.querySelectorAll('[sse-connect]');
        for (var i = 0; i < els.length; i++) {
          var el = els[i];
          var current = el.getAttribute('sse-connect');
          var base = current.split('?')[0];
          el.setAttribute('sse-connect', base + '?token=' + encodeURIComponent(token));
        }
      }

      // Add X-Auth-Token to all HTMX requests
      document.addEventListener('htmx:configRequest', function(evt) {
        var t = getToken();
        if (t) {
          evt.detail.headers['X-Auth-Token'] = t;
        }
      });

      var token = getToken();

      if (token) {
        // Update SSE connection URLs to include token
        updateSSEConnections(token);
      } else {
        // Show auth dialog
        var overlay = document.getElementById('auth-overlay');
        if (overlay) {
          overlay.style.display = 'flex';

          var input = document.getElementById('auth-token-input');
          var btn = document.getElementById('auth-token-btn');

          function saveToken() {
            var val = input.value.trim();
            if (val) {
              setToken(val);
              overlay.style.display = 'none';
              updateSSEConnections(val);
              // Reload to re-initialize HTMX components with token
              window.location.reload();
            }
          }

          btn.addEventListener('click', saveToken);
          input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') saveToken();
          });
          input.focus();
        }
      }
    })();
  </script>
</body>
</html>
