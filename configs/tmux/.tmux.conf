# =============================================================================
# .tmux.conf — Tmux configuration
# =============================================================================
# To use, symlink or copy to ~/.tmux.conf:
#   ln -sf "$PWD/.tmux.conf" ~/.tmux.conf

# ─── Base settings ───────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g history-limit 10000
set -g display-time 3000
set -g display-panes-time 4000

# ─── Mouse support ───────────────────────────────────────────────────────────
set -g mouse on

# ─── Indexing ────────────────────────────────────────────────────────────────
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# ─── Vi-style navigation ─────────────────────────────────────────────────────
set -g status-keys vi
set -g mode-keys vi
setw -g mode-keys vi

# Use vim-like keybindings in copy mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send-keys -X cancel

# ─── Status bar ──────────────────────────────────────────────────────────────
set -g status-interval 5
set -g status-position top
set -g status-style "bg=#1a1b26 fg=#a9b1d6"

set -g status-left "#[bg=#7aa2f7,fg=#1a1b26] #S #[default]"
set -g status-left-length 40

set -g status-right "#[bg=#7aa2f7,fg=#1a1b26] %H:%M #[default]"
set -g status-right-length 60

setw -g window-status-format " #I:#W "
setw -g window-status-current-format "#[bg=#7aa2f7,fg=#1a1b26] #I:#W #[default]"
setw -g window-status-separator ""

# ─── Key bindings ────────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"

# Split panes
bind | split-window -h
bind - split-window -v

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with Shift + arrows
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Window navigation
bind -r C-h previous-window
bind -r C-l next-window

# ─── Plugins (TPM - Tmux Plugin Manager) ────────────────────────────────────
# Install TPM manually:
#   git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
#
# set -g @plugin 'tmux-plugins/tpm'
# set -g @plugin 'tmux-plugins/tmux-sensible'
# set -g @plugin 'tmux-plugins/tmux-resurrect'
# run '~/.tmux/plugins/tpm/tpm'

# ─── Appearance ──────────────────────────────────────────────────────────────
set -g pane-border-style "fg=#2f3346"
set -g pane-active-border-style "fg=#7aa2f7"

# No bells
set -g bell-action none
set -g visual-bell off
