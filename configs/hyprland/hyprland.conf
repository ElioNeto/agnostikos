# =============================================================================
# Hyprland Configuration — AgnosticOS Desktop Profile
# =============================================================================

# -----------------------------------------------------------------------------
# Monitor Setup (HiDPI support)
# -----------------------------------------------------------------------------
# Format: monitor=<name>,<resolution>,<position>,<scale>
# Use `hyprctl monitors` to list available monitors.
monitor=,preferred,auto,1

# Environment variables for HiDPI / Wayland
env = XCURSOR_SIZE,24
env = GDK_SCALE,1
env = GDK_DPI_SCALE,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = _JAVA_AWT_WM_NONREPARENTING,1

# -----------------------------------------------------------------------------
# Startup Programs (exec-once)
# -----------------------------------------------------------------------------
exec-once = waybar
exec-once = hyprpaper
exec-once = dunst
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = pipewire
exec-once = wireplumber

# -----------------------------------------------------------------------------
# Input Configuration
# -----------------------------------------------------------------------------
input {
    kb_layout = br
    kb_variant =
    kb_model =
    kb_options = ctrl:nocaps
    numlock_by_default = true
    follow_mouse = 1
    touchpad {
        natural_scroll = true
        tap-to-click = true
        drag_lock = true
    }
    sensitivity = 0
}

# -----------------------------------------------------------------------------
# General Settings
# -----------------------------------------------------------------------------
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgb(7aa2f7) rgb(bb9af7) 45deg
    col.inactive_border = rgb(1a1b26)
    layout = dwindle
    cursor_inactive_timeout = 3
    no_cursor_warps = false
    no_focus_fallback = false
    resize_on_border = true
    extend_border_grab_area = 15
    hover_icon_on_border = false
}

# -----------------------------------------------------------------------------
# Decoration
# -----------------------------------------------------------------------------
decoration {
    rounding = 10
    active_opacity = 1.0
    inactive_opacity = 0.9
    fullscreen_opacity = 1.0
    blur {
        enabled = true
        size = 4
        passes = 2
        new_optimizations = true
        ignore_opacity = false
        xray = false
    }
    drop_shadow = true
    shadow_range = 10
    shadow_render_power = 3
    col.shadow = rgba(0, 0, 0, 0.5)
}

# -----------------------------------------------------------------------------
# Animations
# -----------------------------------------------------------------------------
animations {
    enabled = true
    bezier = wind, 0.05, 0.9, 0.1, 1.05
    bezier = winIn, 0.1, 1.0, 0.1, 1.1
    bezier = winOut, 0.0, 0.0, 0.2, 1.0
    animation = windows, 1, 6, wind, slide
    animation = windowsOut, 1, 5, winOut, slide
    animation = windowsMove, 1, 5, wind, slide
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, wind, slidevert
}

# -----------------------------------------------------------------------------
# Window Rules
# -----------------------------------------------------------------------------
# Float certain windows
windowrulev2 = float, class:(rofi)
windowrulev2 = float, class:(dunst)
windowrulev2 = float, title:(Settings)
windowrulev2 = center, class:(rofi)
windowrulev2 = center, title:(Settings)
windowrulev2 = noblur, class:(rofi)
windowrulev2 = noblur, class:(dunst)
windowrulev2 = pin, class:(rofi)
windowrulev2 = stayfocused, class:(rofi)

# Ignore maximize requests for floating windows
windowrulev2 = suppressevent maximize, class:(.*)

# -----------------------------------------------------------------------------
# Keybinds
# -----------------------------------------------------------------------------
$mainMod = SUPER

# Terminal
bind = $mainMod, Return, exec, alacritty

# Application Launcher
bind = $mainMod, Space, exec, rofi -show drun

# File Manager
bind = $mainMod, E, exec, yazi

# Browser
bind = $mainMod, B, exec, firefox
bind = $mainMod SHIFT, B, exec, chromium

# Kill active window
bind = $mainMod, Q, killactive

# Fullscreen
bind = $mainMod, F, fullscreen

# Floating toggle
bind = $mainMod, V, togglefloating

# Workspace switching
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9

# Move window to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9

# Cycle windows
bind = ALT, Tab, cyclenext
bind = ALT, Tab, bringactivetotop

# Special workspace (scratchpad)
bind = $mainMod, Grave, togglespecialworkspace
bind = $mainMod SHIFT, Grave, movetoworkspace, special

# Screenshot
bind = , Print, exec, grimblast copy area
bind = SHIFT, Print, exec, grimblast copy screen

# Lock screen
bind = $mainMod, L, exec, loginctl lock-session

# Reload config
bind = $mainMod, R, exec, hyprctl reload

# Exit Hyprland
bind = $mainMod SHIFT, Q, exec, hyprctl dispatch exit

# Volume & Media keys
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindl = , XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindl = , XF86MonBrightnessDown, exec, brightnessctl s 10%-

# Mouse bindings
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
