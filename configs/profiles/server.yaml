# server.yaml — Perfil de servidor
#
# Pacotes para execução de serviços e infraestrutura.
#
# Use: agnostic install --profile server

packages:
  # ---- Sistema Base ----
  - base
  - linux
  - linux-firmware
  - openssh
  - zsh
  - git
  - curl
  - vim
  - htop
  - man-db

  # ---- Monitoramento ----
  - btop
  - lsof
  - strace

  # ---- Rede ----
  - wget
  - nmap
  - netcat
  - iptables-nft
  - bind

  # ---- Segurança ----
  - gnupg
  - fail2ban
  - ufw
